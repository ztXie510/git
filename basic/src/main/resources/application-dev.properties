# 开发环境配置
spring.profiles.active=dev

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/ffms_db?useSSL=false&serverTimezone=GMT%2B8&characterEncoding=utf-8
spring.datasource.username=root
spring.datasource.password=Xie200512
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# Redis配置
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# Mail配置（开发环境使用MailHog）
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# 日志配置
logging.level.root=INFO
logging.level.org.springframework=DEBUG
logging.level.me.spring=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Swagger配置
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# JWT配置
jwt.secret=FFMS2026SecretKeyForJWTTokenGenerationAndValidationBase64Encoded
jwt.expiration=7200000
jwt.refresh-expiration=604800000

# 缓存配置
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# 任务调度配置
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=1000
spring.task.execution.thread-name-prefix=task-executor-

# 热部署配置
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java